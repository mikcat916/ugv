<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>noVNC 实时画面</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Microsoft YaHei UI", "Noto Sans SC", system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: grid;
      grid-template-rows: auto 1fr;
      background:
        radial-gradient(circle at 12% 16%, rgba(13, 185, 242, 0.22), transparent 28%),
        linear-gradient(135deg, #0f172a, #111827);
    }
    .bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(15, 23, 42, 0.86);
      backdrop-filter: blur(12px);
    }
    .status {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      font-size: 0.92rem;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #f59e0b;
      box-shadow: 0 0 18px rgba(245, 158, 11, 0.55);
    }
    .dot.connected {
      background: #22c55e;
      box-shadow: 0 0 18px rgba(34, 197, 94, 0.55);
    }
    .dot.disconnected {
      background: #ef4444;
      box-shadow: 0 0 18px rgba(239, 68, 68, 0.55);
    }
    button {
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.08);
      color: inherit;
      cursor: pointer;
    }
    button:hover { background: rgba(255, 255, 255, 0.14); }
    #screen {
      width: 100%;
      height: 100%;
      min-height: 320px;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    #screen canvas {
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
  <header class="bar">
    <div class="status">
      <span id="dot" class="dot"></span>
      <strong id="status-text">准备连接</strong>
      <span id="target-text"></span>
    </div>
    <div>
      <button id="connect-button" type="button">重新连接</button>
      <button id="disconnect-button" type="button">断开</button>
    </div>
  </header>
  <main id="screen" aria-label="VNC screen"></main>

  <script type="module">
    import RFB from "https://cdn.jsdelivr.net/gh/novnc/noVNC@v1.5.0/core/rfb.js";

    const params = new URLSearchParams(window.location.search);
    const host = params.get("host") || window.location.hostname;
    const port = params.get("port") || "6080";
    const path = params.get("path") || "";
    const viewOnly = params.get("view_only") !== "0";
    const password = params.get("password") || "";
    const scheme = window.location.protocol === "https:" ? "wss" : "ws";
    const target = `${scheme}://${host}:${port}/${path}`;
    const screen = document.getElementById("screen");
    const statusText = document.getElementById("status-text");
    const targetText = document.getElementById("target-text");
    const dot = document.getElementById("dot");
    let rfb = null;

    targetText.textContent = `${host}:${port}${viewOnly ? " · 只读" : " · 可控制"}`;

    function setStatus(text, tone = "") {
      statusText.textContent = text;
      dot.className = `dot ${tone}`;
    }

    function connect() {
      if (rfb) {
        rfb.disconnect();
        rfb = null;
      }
      setStatus("连接中");
      rfb = new RFB(screen, target, password ? { credentials: { password } } : {});
      rfb.viewOnly = viewOnly;
      rfb.scaleViewport = true;
      rfb.resizeSession = true;
      rfb.background = "#0f172a";
      rfb.addEventListener("connect", () => setStatus("已连接", "connected"));
      rfb.addEventListener("disconnect", () => setStatus("已断开", "disconnected"));
      rfb.addEventListener("credentialsrequired", () => {
        const promptedPassword = password || window.prompt("请输入 VNC 密码", "");
        if (promptedPassword) {
          rfb.sendCredentials({ password: promptedPassword });
          return;
        }
        setStatus("需要 VNC 密码", "disconnected");
      });
      rfb.addEventListener("securityfailure", (event) => {
        const reason = event.detail?.reason || "VNC 鉴权失败";
        setStatus(reason, "disconnected");
      });
    }

    document.getElementById("connect-button")?.addEventListener("click", connect);
    document.getElementById("disconnect-button")?.addEventListener("click", () => {
      if (rfb) rfb.disconnect();
    });
    connect();
  </script>
</body>
</html>
