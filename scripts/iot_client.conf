[client]
# 后端服务器地址（填写你的 Windows 电脑局域网 IP + 端口）
server   = http://192.168.1.100:8000

# 设备鉴权 Token（从管理后台 POST /api/iot/tokens 创建后粘贴到这里）
token    = YOUR_DEVICE_TOKEN_HERE

# 遥测上报间隔（秒），建议 30~300
interval = 60

# 当前巡检点 ID（留 0 表示不关联巡检点）
point_id = 0

# 当前巡检路线 ID（留 0 表示不关联路线）
route_id = 0

# GPS 读取超时（秒）
gps_timeout = 5

# GPS 串口设备（可留空；需要串口直读时可填 /dev/ttyAMA0）
gps_serial_device =

# GPS 串口波特率
gps_serial_baud = 9600

# 本地摄像头设备路径（留空则不启用摄像头上传）
# 常见值：/dev/video0
camera_device =

# 摄像头快照上传间隔（秒），0 表示禁用，建议 5~15
camera_interval = 0

# GPS 连续失败时，每隔多少轮重复打印一次告警
gps_log_every = 10

# 是否启用网络定位 fallback（1=启用，0=关闭）
network_locate_enabled = 0

# 网络定位 provider，目前支持 google
network_provider = google

# Google Geolocation API Key
network_api_key =

# 网络定位 API URL
network_api_url = https://www.googleapis.com/geolocation/v1/geolocate

# 网络定位请求超时（秒）
network_timeout = 10

# 用于扫描 Wi-Fi 的网卡
network_interface = wlan0

# 没扫到 Wi-Fi 时，是否允许退回到 IP 粗定位
network_consider_ip = 1

# ── 传感器配置（ros_iot_bridge.py 使用）──────────────────────────────
# 普通摄像头话题（CompressedImage 格式，留空则不订阅）
# 常见值：/usb_cam/image/compressed、/camera/rgb/image_raw/compressed
[sensors]
camera_topic =

# 双目摄像头左路话题（CompressedImage 格式）
stereo_left_topic =

# 双目摄像头右路话题（CompressedImage 格式）
stereo_right_topic =

# 深度图话题（Image 格式，会转成彩色预览图上传）
# 常见值：/camera/depth/image_raw
depth_topic =

# 激光雷达话题（LaserScan 格式）
# 常见值：/scan、/laser/scan
lidar_topic =

# 摄像头/深度图上传间隔（秒），实时页面建议 2~5
camera_interval = 2

# 雷达数据上传间隔（秒），实时页面建议 1~5
lidar_interval = 1
